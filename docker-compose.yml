services:
  # Redis - Session & Cache Storage
  redis:
    image: redis:7-alpine
    container_name: mindmap-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - stock-network

  # Backend API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mindmap-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8787
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:3000/auth/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      # API_URL: Base URL for image download endpoints (used to construct download URLs)
      # If not set, will try to detect from request headers (X-Forwarded-Proto, Host)
      # For production: set to https://your-api-domain.com
      - API_URL=${API_URL:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_OWNER=${GITHUB_OWNER:-}
      - GITHUB_ORG=${GITHUB_ORG:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - DEV_MODE=${DEV_MODE:-false}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      # Git provider selection: github (default) or local
      - GIT_PROVIDER=${GIT_PROVIDER:-github}
      # Local Git settings (used when GIT_PROVIDER=local)
      - LOCAL_GIT_ROOT=${LOCAL_GIT_ROOT:-/data/repos}
      - LOCAL_GIT_OWNER=${LOCAL_GIT_OWNER:-local}
      - LOCAL_GIT_AUTHOR_NAME=${LOCAL_GIT_AUTHOR_NAME:-Mindmap Ziin}
      - LOCAL_GIT_AUTHOR_EMAIL=${LOCAL_GIT_AUTHOR_EMAIL:-mindmap@ziin.ai}
      - LOCAL_GIT_SHELL=${LOCAL_GIT_SHELL:-git}
      # PDF rendering settings (Playwright)
      - PLAYWRIGHT_MAX_BROWSERS=${PLAYWRIGHT_MAX_BROWSERS:-3}
      - PLAYWRIGHT_MAX_CONTEXTS=${PLAYWRIGHT_MAX_CONTEXTS:-5}
      # PDF cache settings
      - PDF_CACHE_TTL=${PDF_CACHE_TTL:-3600}
    volumes:
      # Persist local git repositories on the host when using GIT_PROVIDER=local
      - ${LOCAL_GIT_ROOT_HOST:-./data/repos}:${LOCAL_GIT_ROOT:-/data/repos}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - stock-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://mindmap-api.ziin.ai}
        - VITE_ADSENSE_ENABLED=${VITE_ADSENSE_ENABLED:-true}
    container_name: mindmap-frontend
    restart: unless-stopped
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - stock-network

networks:
  stock-network:
    external: true

volumes:
  redis-data:
    driver: local

