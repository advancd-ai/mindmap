name: Validate Schema

on:
  pull_request:
    paths:
      - 'maps/**.json'
      - 'schemas/**.json'
      - 'scripts/validate.mjs'
  push:
    branches:
      - main
    paths:
      - 'maps/**.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install ajv@^8.12.0
          npm install ajv-formats@^2.1.1

      - name: Run schema validation
        run: node scripts/validate.mjs

      - name: Check file sizes
        run: |
          echo "Checking map file sizes..."
          find maps -name "map_*.json" -type f -exec sh -c '
            size=$(stat -f%z "$1" 2>/dev/null || stat -c%s "$1" 2>/dev/null)
            size_mb=$(echo "scale=2; $size / 1048576" | bc)
            if [ $(echo "$size_mb > 2" | bc) -eq 1 ]; then
              echo "❌ $1 exceeds 2MB limit: ${size_mb}MB"
              exit 1
            else
              echo "✅ $1: ${size_mb}MB"
            fi
          ' sh {} \;

      - name: Comment PR (on failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Schema validation failed. Please check the workflow logs for details.'
            })

