name: Publish Images to GHCR

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'frontend/**'
      - '.github/workflows/publish-ghcr.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: ./api
            file: ./api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/mindmap-api
          - name: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/mindmap-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for linux/arm64 on hosted runners)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate timestamp tag
        id: ts
        run: echo "tag=$(date -u +'%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.ts.outputs.tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  make-packages-public:
    needs: build-and-push
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set GHCR package visibility to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          for PKG in mindmap-api mindmap-frontend; do
            echo "Setting visibility=public for $PKG"
            if gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${OWNER}/packages/container/${PKG}" \
              -f visibility=public; then
              echo "OK (org package)"
            elif gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${PKG}" \
              -f visibility=public; then
              echo "OK (user package)"
            else
              echo "::warning::Could not set $PKG to public via API. Set it in GitHub → Packages → Package settings → Change visibility."
            fi
          done
