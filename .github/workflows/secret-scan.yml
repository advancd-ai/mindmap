name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        if: always() && secrets.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            COLOR=3066993
            STATUS_TEXT="SUCCESS"
          else
            COLOR=15158332
            STATUS_TEXT="FAILED"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [
              {
                "title": "Secret Scan ${STATUS_TEXT}",
                "color": ${COLOR},
                "fields": [
                  { "name": "Repository", "value": "${REPOSITORY}", "inline": true },
                  { "name": "Event", "value": "${EVENT_NAME}", "inline": true },
                  { "name": "Branch", "value": "${REF_NAME}", "inline": true },
                  { "name": "Actor", "value": "${ACTOR}", "inline": true },
                  { "name": "Workflow Run", "value": "[Open run](${RUN_URL})", "inline": false }
                ]
              }
            ]
          }
          EOF
          )

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
