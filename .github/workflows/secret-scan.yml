name: Secret Scanning Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: read

jobs:
  secret-scanning:
    runs-on: ubuntu-latest

    steps:
      - name: Check GitHub secret scanning alerts
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECRET_SCANNING_TOKEN: ${{ secrets.SECRET_SCANNING_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          API_TOKEN="${SECRET_SCANNING_TOKEN:-$GITHUB_TOKEN}"

          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer $API_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}/secret-scanning/alerts?state=open&per_page=100")

          body=$(echo "$response" | sed '$d')
          status_code=$(echo "$response" | tail -n 1)

          if [ "$status_code" -eq 403 ]; then
            echo "::warning::Secret Scanning API is not accessible with current token (HTTP 403). Add SECRET_SCANNING_TOKEN with security-events:read (and repo read) to enforce this check."
            echo "open_count=unavailable" >> "$GITHUB_OUTPUT"
            echo "scan_status=unavailable" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$status_code" -ne 200 ]; then
            echo "GitHub Secret Scanning API request failed (HTTP $status_code)."
            echo "$body"
            exit 1
          fi

          open_count=$(echo "$body" | jq 'length')
          echo "open_count=$open_count" >> "$GITHUB_OUTPUT"
          echo "scan_status=ok" >> "$GITHUB_OUTPUT"

          if [ "$open_count" -gt 0 ]; then
            echo "Found $open_count open secret scanning alert(s)."
            exit 1
          fi
          echo "No open secret scanning alerts found."

      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OPEN_ALERTS: ${{ steps.scan.outputs.open_count || 'unknown' }}
          SCAN_STATUS: ${{ steps.scan.outputs.scan_status || 'unknown' }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            COLOR=3066993
            STATUS_TEXT="SUCCESS"
          else
            COLOR=15158332
            STATUS_TEXT="FAILED"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [
              {
                "title": "Secret Scan ${STATUS_TEXT}",
                "color": ${COLOR},
                "fields": [
                  { "name": "Repository", "value": "${REPOSITORY}", "inline": true },
                  { "name": "Event", "value": "${EVENT_NAME}", "inline": true },
                  { "name": "Branch", "value": "${REF_NAME}", "inline": true },
                  { "name": "Actor", "value": "${ACTOR}", "inline": true },
                  { "name": "Scan Status", "value": "${SCAN_STATUS}", "inline": true },
                  { "name": "Open Alerts", "value": "${OPEN_ALERTS}", "inline": true },
                  { "name": "Workflow Run", "value": "[Open run](${RUN_URL})", "inline": false }
                ]
              }
            ]
          }
          EOF
          )

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
