apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindmap-api
  namespace: mindmap
  labels:
    app: mindmap-api
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mindmap-api
  template:
    metadata:
      labels:
        app: mindmap-api
        component: backend
    spec:
      containers:
      - name: api
        # Published by CI: .github/workflows/publish-ghcr.yml → ghcr.io/<GitHub owner>/mindmap-api
        # Tags: latest (main), or YYYYMMDD-HHMM (UTC). Images are linux/arm64 only.
        image: ghcr.io/advancd-ai/mindmap-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8787
          name: http
        env:
        # From ConfigMap
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: mindmap-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: mindmap-config
              key: PORT
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: mindmap-config
              key: REDIS_URL
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: mindmap-config
              key: FRONTEND_URL
        - name: API_URL
          valueFrom:
            configMapKeyRef:
              name: mindmap-config
              key: API_URL
              optional: true
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: mindmap-config
              key: CORS_ORIGIN
        - name: DEV_MODE
          valueFrom:
            configMapKeyRef:
              name: mindmap-config
              key: DEV_MODE
        - name: DISCORD_WEBHOOK_URL
          valueFrom:
            configMapKeyRef:
              name: mindmap-config
              key: DISCORD_WEBHOOK_URL
              optional: true
        - name: GIT_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: mindmap-config
              key: GIT_PROVIDER
        - name: LOCAL_GIT_ROOT
          valueFrom:
            configMapKeyRef:
              name: mindmap-config
              key: LOCAL_GIT_ROOT
        - name: LOCAL_GIT_OWNER
          valueFrom:
            configMapKeyRef:
              name: mindmap-config
              key: LOCAL_GIT_OWNER
        - name: LOCAL_GIT_AUTHOR_NAME
          valueFrom:
            configMapKeyRef:
              name: mindmap-config
              key: LOCAL_GIT_AUTHOR_NAME
        - name: LOCAL_GIT_AUTHOR_EMAIL
          valueFrom:
            configMapKeyRef:
              name: mindmap-config
              key: LOCAL_GIT_AUTHOR_EMAIL
        
        # From Secrets
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: mindmap-secrets
              key: GOOGLE_CLIENT_ID
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: mindmap-secrets
              key: GOOGLE_CLIENT_SECRET
        - name: GOOGLE_REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: mindmap-secrets
              key: GOOGLE_REDIRECT_URI
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: mindmap-secrets
              key: GITHUB_TOKEN
              optional: true
        - name: GITHUB_OWNER
          valueFrom:
            secretKeyRef:
              name: mindmap-secrets
              key: GITHUB_OWNER
              optional: true
        - name: GITHUB_ORG
          valueFrom:
            secretKeyRef:
              name: mindmap-secrets
              key: GITHUB_ORG
              optional: true
        - name: GITHUB_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: mindmap-secrets
              key: GITHUB_WEBHOOK_SECRET
              optional: true
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mindmap-secrets
              key: REDIS_PASSWORD
              optional: true
        
        volumeMounts:
        - name: local-git-data
          mountPath: /data/repos
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8787
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8787
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      
      volumes:
      - name: local-git-data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: mindmap-api-service
  namespace: mindmap
  labels:
    app: mindmap-api
spec:
  type: ClusterIP
  ports:
  - port: 8787
    targetPort: 8787
    name: http
  selector:
    app: mindmap-api








