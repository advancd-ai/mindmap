# Non-secret API settings. See docs/ENVIRONMENT.md and deployment/kubernetes/api-deployment.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: mindmap-config
  namespace: mindmap
data:
  # API Configuration
  NODE_ENV: "production"
  PORT: "8787"
  REDIS_URL: "redis://redis-service:6379"
  FRONTEND_URL: "http://localhost:3000"
  # API_URL: Base URL for image download endpoints (used to construct download URLs)
  # If not set, will try to detect from request headers (X-Forwarded-Proto, Host)
  # For production: set to https://your-api-domain.com or leave empty for auto-detection
  API_URL: ""
  CORS_ORIGIN: "http://localhost:3000,https://yourdomain.com"
  DEV_MODE: "false"
  DISCORD_WEBHOOK_URL: ""
  
  # Storage: local on-disk Git (maps under LOCAL_GIT_ROOT). Use github + Secrets instead if preferred.
  GIT_PROVIDER: "local"
  LOCAL_GIT_ROOT: "/data/repos"
  LOCAL_GIT_OWNER: "local"
  LOCAL_GIT_AUTHOR_NAME: "Mindmap Ziin"
  LOCAL_GIT_AUTHOR_EMAIL: "mindmap@ziin.ai"
  
  # Redis Configuration
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"

  # Frontend container env (docker-entrypoint.sh → /runtime-config.js). Same names as Vite for consistency.
  # Set to your public API origin, e.g. https://api.example.com — empty means app falls back to /api (same-origin).
  VITE_API_URL: ""
  VITE_ADSENSE_ENABLED: "true"








