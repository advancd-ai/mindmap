apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindmap-frontend
  namespace: mindmap
  labels:
    app: mindmap-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mindmap-frontend
  template:
    metadata:
      labels:
        app: mindmap-frontend
        component: frontend
    spec:
      containers:
      - name: frontend
        # Published by CI: .github/workflows/publish-ghcr.yml → ghcr.io/<GitHub owner>/mindmap-frontend
        # Tags: latest (main), or YYYYMMDD-HHMM (UTC). Images are linux/arm64 only.
        image: ghcr.io/advancd-ai/mindmap-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        env:
          - name: VITE_API_URL
            valueFrom:
              configMapKeyRef:
                name: mindmap-config
                key: VITE_API_URL
          - name: VITE_ADSENSE_ENABLED
            valueFrom:
              configMapKeyRef:
                name: mindmap-config
                key: VITE_ADSENSE_ENABLED

---
apiVersion: v1
kind: Service
metadata:
  name: mindmap-frontend-service
  namespace: mindmap
  labels:
    app: mindmap-frontend
spec:
  # External access is via Gateway API (gateway-api.yaml), not a cloud LoadBalancer per Service.
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    name: http
  selector:
    app: mindmap-frontend









